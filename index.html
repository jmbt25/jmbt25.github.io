<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A 3D life simulation that knows you're watching." />
  <title>Mini World — a world that knows you're watching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
<div id="app">

  <!-- ── Canvas + HUD ──────────────────────────────────────────────────── -->
  <div id="canvas-container">
    <canvas id="world-canvas"></canvas>

    <!-- Subtle red/burgundy frame glow (always on, low opacity) -->
    <div id="world-frame-glow" aria-hidden="true"></div>

    <!-- Centered pixel-style title (fades after a few seconds) -->
    <div id="world-title">
      <div class="world-title-main">MINI WORLD</div>
      <div class="world-title-tag">a world that knows you're watching</div>
    </div>

    <!-- ─ TOP-LEFT · simulation status panel ───────────────────────── -->
    <div id="hud-tl" class="hud-panel">
      <div class="hud-panel-head">
        <span class="hud-panel-title">WORLD SIMULATION <span class="hud-version">v1.7.3</span></span>
      </div>
      <div class="hud-stat-row">
        <span class="hud-stat-icon">◐</span>
        <span class="hud-stat-label">POPULATION</span>
        <span class="hud-stat-value" id="stat-pop">0</span>
      </div>
      <div class="hud-stat-row">
        <span class="hud-stat-icon">⚑</span>
        <span class="hud-stat-label">TRIBES</span>
        <span class="hud-stat-value" id="stat-tribes">0</span>
      </div>
      <div class="hud-stat-row">
        <span class="hud-stat-icon">⏱</span>
        <span class="hud-stat-label">TIME</span>
        <span class="hud-stat-value" id="stat-time">00:00</span>
      </div>
      <div class="hud-stat-row">
        <span class="hud-stat-icon">☼</span>
        <span class="hud-stat-label">ENVIRONMENT</span>
        <span class="hud-stat-value" id="stat-env">DAWN</span>
      </div>
      <div class="hud-stat-row">
        <span class="hud-stat-icon">◉</span>
        <span class="hud-stat-label">WATCHERS</span>
        <span class="hud-stat-value" id="stat-watchers">1</span>
      </div>
    </div>

    <!-- ─ TOP-RIGHT · transport controls + event feed ──────────────── -->
    <div id="hud-tr" class="hud-panel">
      <div class="hud-controls">
        <button class="ctrl-btn" id="btn-pause" title="Pause / Resume — Space">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-play" title="1× — normal speed">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-fast" title="Faster — ]">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M4 5v14l9-7zM13 5v14l9-7z"/></svg>
        </button>
        <span class="ctrl-speed" id="stat-speed">1×</span>
      </div>
      <div id="event-log" class="event-log">
        <div class="event-empty">— awaiting events —</div>
      </div>
    </div>

    <!-- ─ BOTTOM-LEFT · minimap card ───────────────────────────────── -->
    <div id="minimap-host" class="hud-panel">
      <canvas id="minimap-canvas" width="180" height="120"></canvas>
      <div class="minimap-eye" title="Click on the map to pan there">◉</div>
    </div>

    <!-- ─ BOTTOM-CENTER · resource bars ────────────────────────────── -->
    <div id="hud-bottom" class="hud-panel">
      <div class="resbar" data-key="energy">
        <div class="resbar-row">
          <span class="resbar-icon energy">⚡</span>
          <span class="resbar-label">ENERGY</span>
        </div>
        <div class="resbar-meter-row">
          <span class="resbar-meter"><i id="bar-energy"></i></span>
          <span class="resbar-value" id="count-energy">0%</span>
        </div>
      </div>
      <div class="resbar" data-key="food">
        <div class="resbar-row">
          <span class="resbar-icon food">▲</span>
          <span class="resbar-label">FOOD</span>
        </div>
        <div class="resbar-meter-row">
          <span class="resbar-meter"><i id="bar-food"></i></span>
          <span class="resbar-value" id="count-food">0%</span>
        </div>
      </div>
      <div class="resbar" data-key="wood">
        <div class="resbar-row">
          <span class="resbar-icon wood">♣</span>
          <span class="resbar-label">WOOD</span>
        </div>
        <div class="resbar-meter-row">
          <span class="resbar-meter"><i id="bar-wood"></i></span>
          <span class="resbar-value" id="count-wood">0%</span>
        </div>
      </div>
      <div class="resbar" data-key="stone">
        <div class="resbar-row">
          <span class="resbar-icon stone">◆</span>
          <span class="resbar-label">STONE</span>
        </div>
        <div class="resbar-meter-row">
          <span class="resbar-meter"><i id="bar-stone"></i></span>
          <span class="resbar-value" id="count-stone">0%</span>
        </div>
      </div>
      <div class="resbar" data-key="happiness">
        <div class="resbar-row">
          <span class="resbar-icon happiness">✦</span>
          <span class="resbar-label">HAPPINESS</span>
        </div>
        <div class="resbar-meter-row">
          <span class="resbar-meter"><i id="bar-happiness"></i></span>
          <span class="resbar-value" id="count-happiness">0%</span>
        </div>
      </div>
    </div>

    <!-- ─ BOTTOM-RIGHT · world seed ────────────────────────────────── -->
    <div id="hud-seed" class="hud-panel">
      <div class="seed-text">
        <span class="seed-label">WORLD SEED</span>
        <span class="seed-value" id="seed-value">—</span>
      </div>
      <button class="seed-roll" id="btn-reseed" title="Roll a new seed and regenerate">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="15.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="12"   cy="12"  r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="8.5"  cy="15.5" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="15.5" cy="15.5" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>

    <!-- Pause overlay -->
    <div id="pause-overlay">
      <div class="pause-card">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        <div>PAUSED</div>
        <div class="pause-hint">Press space to resume</div>
      </div>
    </div>

    <!-- Cinematic Thronglet moment overlay -->
    <div id="moment-vignette"></div>
    <div id="moment-attribution">
      <span class="moment-attr-eye">◉</span>
      <span>mini world · <b id="moment-attr-stage">stage 1</b></span>
    </div>
    <div id="moment-subtitle">
      <div class="moment-sub-speaker" id="moment-sub-speaker"></div>
      <div class="moment-sub-text" id="moment-sub-text"></div>
    </div>

    <!-- Toast notifications (kept, but styled subtler) -->
    <div id="toast-host"></div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js?v=4"></script>
</body>
</html>
